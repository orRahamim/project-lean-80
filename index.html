<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#c94f3d"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="default"/><meta name="apple-mobile-web-app-title" content="Pasta Prep"/><link rel="manifest" href="./manifest.webmanifest"/><link rel="apple-touch-icon" href="./assets/icon-192.png"/><title>Pasta Prep</title><style>:root{--bg:#fff8f4;--card:#fff;--text:#261814;--muted:#7a625c;--line:#efd8d1;--primary:#c94f3d;--primary-2:#8f2d21;--chip:#f9e1db;--radius:18px;--shadow:0 10px 30px rgba(107,38,25,.10)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#fff8f4,#fff1eb);color:var(--text)}.app{max-width:900px;margin:0 auto;padding:18px 16px 96px}.hero{background:linear-gradient(135deg,#c94f3d,#e07a5f);color:#fff;padding:20px;border-radius:24px;box-shadow:var(--shadow)}.hero h1{margin:0 0 8px;font-size:32px;line-height:1.05}.hero p{margin:0;font-size:15px;opacity:.92}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}input,select{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:#fff;font-size:16px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 18px}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}.stat b{display:block;font-size:22px;color:var(--primary-2)}.stat span{font-size:13px;color:var(--muted)}.grid{display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.top{display:flex;justify-content:space-between;gap:12px;align-items:start}.chip{background:var(--chip);color:var(--primary-2);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}h2{font-size:21px;margin:0 0 6px}.meta{color:var(--muted);font-size:14px;margin-bottom:12px}.macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.macro{background:#fff8f4;border-radius:12px;padding:10px;text-align:center}.macro strong{display:block;font-size:18px}details{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}summary{cursor:pointer;font-weight:700;color:var(--primary-2)}ul,ol{padding-right:18px}li{margin:7px 0}.install{position:fixed;left:12px;right:12px;bottom:12px;background:#261814;color:#fff;padding:14px 16px;border-radius:18px;font-size:14px;box-shadow:var(--shadow)}.install small{display:block;opacity:.8;margin-top:4px}@media (min-width:700px){.grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:40px}}</style></head><body><main class="app"><section class="hero"><h1>Pasta Prep</h1><p>דמו מוכן ל-GitHub Pages: חיפוש, סינון, ומתכוני עגבניות־פסטה לפתיחה דרך Safari והוספה למסך הבית.</p></section><section class="toolbar" aria-label="חיפוש וסינון"><input id="search" type="search" placeholder="חפש מתכון או רכיב..."/><select id="filter"><option value="all">כל הקטגוריות</option><option value="מהיר">מהיר</option><option value="חלבון גבוה">חלבון גבוה</option><option value="Meal Prep">Meal Prep</option></select></section><section class="stats"><article class="stat"><b>3</b><span>מתכונים</span></article><article class="stat"><b>10-15</b><span>דקות הכנה</span></article><article class="stat"><b>GitHub</b><span>Pages-ready</span></article></section><section id="recipes" class="grid"></section></main><div class="install">אחרי ההעלאה: פתח את ה-URL ב-Safari, לחץ Share ואז Add to Home Screen.<small>כך תקבל חוויה קרובה לאפליקציה באייפון.</small></div><script>const recipes=[{"id": "classic", "name": "פסטה עגבניות קלאסית", "category": "מהיר", "prep": 10, "cook": 15, "servings": 2, "calories": 520, "protein": 14, "carbs": 82, "fat": 15, "ingredients": ["200 גרם פסטה יבשה", "3 עגבניות בשלות קצוצות", "2 שיני שום", "2 כפות שמן זית", "מלח ופלפל", "בזיליקום להגשה"], "steps": ["מבשלים את הפסטה עד אל דנטה ושומרים חצי כוס ממי הבישול.", "מחממים שמן זית, מוסיפים שום ואז את העגבניות, ומבשלים 8 דקות עד ריכוך.", "מוסיפים את הפסטה ומעט ממי הבישול, מערבבים היטב ומגישים עם בזיליקום."]}, {"id": "protein", "name": "פסטה עגבניות עם קוטג׳ וחלבון גבוה", "category": "חלבון גבוה", "prep": 12, "cook": 15, "servings": 2, "calories": 560, "protein": 32, "carbs": 74, "fat": 14, "ingredients": ["180 גרם פסטה יבשה", "250 גרם עגבניות מרוסקות", "150 גרם קוטג׳ 5%", "1 בצל קטן", "1 כף שמן זית", "פפריקה, מלח ופלפל"], "steps": ["מבשלים את הפסטה ומסננים.", "מטגנים בצל בשמן, מוסיפים עגבניות מרוסקות ותבלינים ומבשלים 7 דקות.", "מכבים את האש, מערבבים פנימה את הקוטג׳ ואז את הפסטה, עד קבלת רוטב קרמי."]}, {"id": "bake", "name": "פסטה אפויה ברוטב עגבניות", "category": "Meal Prep", "prep": 15, "cook": 25, "servings": 4, "calories": 610, "protein": 24, "carbs": 76, "fat": 20, "ingredients": ["300 גרם פסטה", "400 גרם רוטב עגבניות", "150 גרם גבינה צהובה מגוררת", "1 קישוא קצוץ", "1 כף שמן זית", "אורגנו, מלח, פלפל"], "steps": ["מבשלים את הפסטה חצי בישול.", "מערבבים עם רוטב העגבניות, הקישוא, התבלינים וחצי מהגבינה.", "מעבירים לתבנית, מפזרים גבינה ואופים 20 דקות עד השחמה."]}];const list=document.getElementById('recipes');const search=document.getElementById('search');const filter=document.getElementById('filter');function card(r){return `<article class="card"><div class="top"><div><h2>${r.name}</h2><div class="meta">${r.servings} מנות · ${r.prep} דק' הכנה · ${r.cook} דק' בישול</div></div><span class="chip">${r.category}</span></div><div class="macros"><div class="macro"><strong>${r.calories}</strong><span>קלוריות</span></div><div class="macro"><strong>${r.protein}g</strong><span>חלבון</span></div><div class="macro"><strong>${r.carbs}g</strong><span>פחמימות</span></div><div class="macro"><strong>${r.fat}g</strong><span>שומן</span></div></div><details><summary>רכיבים</summary><ul>${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul></details><details><summary>שלבי הכנה</summary><ol>${r.steps.map(i=>`<li>${i}</li>`).join('')}</ol></details></article>`}function render(){const q=search.value.trim().toLowerCase();const f=filter.value;const items=recipes.filter(r=>(f==='all'||r.category===f)&&JSON.stringify(r).toLowerCase().includes(q));list.innerHTML=items.map(card).join('')||'<article class="card"><h2>לא נמצאו מתכונים</h2><p>נסה חיפוש אחר או בחר קטגוריה שונה.</p></article>'}search.addEventListener('input',render);filter.addEventListener('change',render);render();if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}</script></body></html>
