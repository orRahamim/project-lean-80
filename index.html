<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#c94f3d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Recipe DB">

    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./styles.css">

    <title>Recipe DB</title>
  </head>
  <body>
    <div id="backdrop" class="drawer-backdrop"></div>

    <main class="app">
      <section class="hero">
        <h1>Recipe DB</h1>
        <p>
          High-protein meal prep database with normalized English tags,
          reliable filtering, and outside-tap-to-close drawers.
        </p>

        <div class="mini">
          <span id="miniRecipes">0 recipes</span>
          <span>3 meals + dessert</span>
          <span>Meal Prep</span>
          <span>iPhone-friendly</span>
        </div>
      </section>

      <section class="toolbar">
        <input
          id="search"
          type="search"
          placeholder="Search by recipe, ingredient, or tag..."
        >

        <select id="category">
          <option value="all">All categories</option>
        </select>

        <select id="mealType">
          <option value="all">All meal types</option>
        </select>

        <select id="sort">
          <option value="default">Default sort</option>
          <option value="protein">Highest protein</option>
          <option value="caloriesAsc">Lowest calories</option>
          <option value="caloriesDesc">Highest calories</option>
        </select>
      </section>

      <section class="toolbar2">
        <select id="prep">
          <option value="all">All prep times</option>
          <option value="15">Up to 15 min</option>
          <option value="30">Up to 30 min</option>
        </select>

        <select id="protein">
          <option value="all">All protein levels</option>
          <option value="25">25+ g protein</option>
          <option value="35">35+ g protein</option>
          <option value="45">45+ g protein</option>
        </select>

        <select id="storage">
          <option value="all">All storage</option>
          <option value="mealprep">Meal Prep</option>
          <option value="freezer">Freezer friendly</option>
        </select>

        <select id="servings">
          <option value="all">All servings</option>
          <option value="1">1 serving</option>
          <option value="2">2 servings</option>
          <option value="4">4+ servings</option>
        </select>
      </section>

      <section class="toolbar3" id="quickTags"></section>

      <section class="stats">
        <article class="stat">
          <b id="countRecipes">0</b>
          <span>Visible recipes</span>
        </article>

        <article class="stat">
          <b id="avgProtein">0g</b>
          <span>Average protein</span>
        </article>

        <article class="stat">
          <b id="avgCalories">0</b>
          <span>Average calories</span>
        </article>

        <article class="stat">
          <b id="countMealPrep">0</b>
          <span>Meal-prep recipes</span>
        </article>
      </section>

      <section id="recipes" class="grid"></section>
    </main>

    <aside id="drawer" class="drawer" aria-hidden="true">
      <div class="drawerHead">
        <h3 id="drawerTitle"></h3>
        <button class="close" id="closeDrawer">Close</button>
      </div>

      <div id="drawerMeta" class="badges"></div>
      <div class="macros" id="drawerMacros"></div>

      <div class="drawerSection">
        <h4>Ingredients</h4>
        <ul id="drawerIngredients"></ul>
      </div>

      <div class="drawerSection">
        <h4>Steps</h4>
        <ol id="drawerSteps"></ol>
      </div>

      <div class="drawerSection">
        <h4>Tags</h4>
        <div id="drawerTags" class="badges"></div>
      </div>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
